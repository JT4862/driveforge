<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DriveForge{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/logo-mark.png">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  {% block chrome %}
  <header class="topbar">
    <div class="brand">
      <a href="/">
        <img src="/static/logo-mark.png" alt="" class="brand-mark">
        <span class="brand-text"><span class="brand-teal">Drive</span>Forge</span>
      </a>
    </div>
    <nav class="tabs">
      <a href="/" class="tab{% if request.url.path == '/' %} active{% endif %}" accesskey="d">Dashboard</a>
      <a href="/batches" class="tab{% if '/batches' in request.url.path %} active{% endif %}" accesskey="b">Batches</a>
      <a href="/history" class="tab{% if '/history' in request.url.path %} active{% endif %}" accesskey="h">History</a>
      <a href="/settings" class="tab{% if '/settings' in request.url.path %} active{% endif %}" accesskey=",">Settings</a>
    </nav>
  </header>
  {% endblock %}
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <span>DriveForge v0.1.0</span>
    <span class="spacer"></span>
    <span>No external dependencies required</span>
  </footer>
</body>
</html>
