### DriveForge unattended Debian 12 install — embedded in the installer ISO
###
### This preseed is intentionally LIGHT-TOUCH on partitioning. We do NOT
### auto-pick the install disk because a wrong choice would secure-erase one
### of the user's drive-bay targets. The user must select the OS disk
### interactively at the partitioning step. Everything else is automated.

### Locale + keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
# DHCP — the user can convert to a static IP later via netplan if needed.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string driveforge
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

### Mirror — set but unused: late_command installs from the offline bundle
### embedded on the ISO instead of from a network mirror.
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Accounts
# Root account disabled; first user is the admin. The DriveForge daemon runs
# as a separate `driveforge` system account created by install.sh — it's NOT
# this login user.
d-i passwd/root-login boolean false
d-i passwd/user-fullname string DriveForge Admin
# IMPORTANT: do not name the admin user "driveforge" — collides with the
# system account install.sh creates for the daemon. README warns about this.
d-i passwd/username string admin
# Default password is "driveforge" — operator MUST change immediately on
# first login. Consider this a setup-only credential.
d-i passwd/user-password password driveforge
d-i passwd/user-password-again password driveforge
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Clock + timezone
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Partitioning — INTERACTIVE (user picks disk).
# We deliberately do NOT preseed partman-auto/disk because picking the wrong
# disk on a multi-bay refurb rig would format a drive-under-test target.
# The installer will pause at the partitioning step and the operator selects
# the OS disk from the menu. Everything after partitioning resumes
# unattended.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system
d-i base-installer/install-recommends boolean false
d-i apt-setup/use_mirror boolean false
d-i apt-setup/services-select multiselect
d-i apt-setup/security_host string

### Tasksel — minimal. install.sh handles everything else.
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### Late command — runs after Debian's base install completes, before reboot.
### Bootstraps DriveForge from the offline bundle embedded on the ISO. The
### env var tells install.sh to use the cached debs + wheels instead of
### reaching for the network (which may not exist on the target).
d-i preseed/late_command string \
  cp -r /cdrom/driveforge-bundle /target/usr/local/share/driveforge-bundle ; \
  in-target /bin/bash -c 'DRIVEFORGE_OFFLINE_BUNDLE=/usr/local/share/driveforge-bundle /usr/local/share/driveforge-bundle/scripts/install.sh > /var/log/driveforge-install.log 2>&1' || \
  in-target /bin/bash -c 'echo "DriveForge install FAILED — see /var/log/driveforge-install.log" >&2'
