### DriveForge unattended Debian 12 install — embedded in the installer ISO
###
### Strategy: skip tasksel entirely (no desktop bloat), explicitly include
### only what we need (openssh-server + sudo), then let DriveForge's
### install.sh handle the rest from the offline bundle baked into the ISO.
###
### Partitioning is INTENTIONALLY INTERACTIVE — auto-picking the install
### disk on a multi-bay refurb rig would risk overwriting a drive-under-test
### target. The operator picks the OS disk from the menu; everything else
### is automated.

### Top-of-file controls — make absolutely sure we run unattended
d-i auto-install/enable boolean true
d-i debconf/priority select critical

### Locale + keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network — DHCP. Static IP can be set later via netplan if needed.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string driveforge
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string
# In QEMU/test mode there's no real network configuration to do; skip the
# question if the auto-detect can't reach a DHCP server.
d-i netcfg/dhcp_timeout string 30

### Mirror — set but unused: install.sh installs from the embedded offline
### bundle, no network mirror needed during late_command.
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Clock + timezone
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Accounts
###
### Root login DISABLED. The first user becomes the admin and is added to
### the `sudo` group so they can re-run install.sh / debug.
###
### IMPORTANT: do NOT name the admin user "driveforge" — that name is
### reserved for the system account install.sh creates for the daemon.
### Also avoid "admin" — Debian rejects it as a reserved system username
### (confirmed in a QEMU test on 2026-04-20: the installer paused with
### "The username you entered (admin) is reserved for use by the system").
### "dfadmin" works, is clearly DriveForge-related, and isn't reserved.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string DriveForge Admin
d-i passwd/username string dfadmin
# Setup-only password — operator MUST change immediately after first login.
d-i passwd/user-password password driveforge
d-i passwd/user-password-again password driveforge
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false
# Default groups Debian gives the first user OMIT `sudo`. Override so the
# admin user can sudo from the start — without this, post-install access
# requires editing /etc/sudoers via single-user mode.
d-i passwd/user-default-groups string adm cdrom dialout floppy audio dip video plugdev users netdev sudo

### Partitioning — INTERACTIVE (user picks disk).
###
### The installer pauses at "Select disk" — that's by design. Auto-picking
### would risk overwriting a drive-under-test target on a multi-bay rig.
### Once the operator confirms the disk, everything else is automated.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system
d-i base-installer/install-recommends boolean false

### apt setup — no online repos during install (we install from the bundle).
### These suppress the "scan another CD?" and "configure mirror?" prompts.
d-i apt-setup/use_mirror boolean false
d-i apt-setup/services-select multiselect
d-i apt-setup/security_host string
d-i apt-cdrom-setup/no-update boolean true

### Software selection — KEY FIX from the first ISO build.
###
### Don't run tasksel at all. Debian's default tasksel selection includes
### "Debian desktop environment" (~700 MB of GNOME) which we explicitly
### don't want — this is an appliance, not a workstation. Disabling tasksel
### entirely is more reliable than trying to override its multiselect via
### preseed (which Debian 12 frequently ignores).
###
### Then explicitly include the bare-minimum packages we need before
### install.sh takes over: openssh-server (operator access) and sudo (so
### the admin user can elevate). Everything else (smartmontools, hdparm,
### sg3-utils, nvme-cli, etc.) install.sh installs from the offline bundle.
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string openssh-server sudo
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### Late command — runs after Debian base install completes, before reboot.
### Bootstraps DriveForge from the offline bundle embedded on the ISO.
###
### `&&` (not `;`) so the in-target install only runs when the cp succeeds,
### and the failure-marker file `/target/var/log/driveforge-install-FAILED`
### gets written if anything in the install path errors out — easier to
### diagnose post-reboot via `ls /var/log/driveforge-install*`.
d-i preseed/late_command string \
  cp -r /cdrom/driveforge-bundle /target/usr/local/share/driveforge-bundle && \
  in-target /bin/bash -c 'DRIVEFORGE_OFFLINE_BUNDLE=/usr/local/share/driveforge-bundle /usr/local/share/driveforge-bundle/scripts/install.sh > /var/log/driveforge-install.log 2>&1' || \
  echo "DriveForge install FAILED — see /var/log/driveforge-install.log" > /target/var/log/driveforge-install-FAILED
