### DriveForge unattended Debian 12 install — embedded in the installer ISO
###
### Strategy: skip tasksel entirely (no desktop bloat), explicitly include
### only the minimum needed for late_command (git, ca-certificates, sudo,
### openssh-server), then let DriveForge's install.sh git-clone the repo
### and apt-install runtime deps from the Debian mirror. Network-install
### architecture — target needs internet during install; air-gapped users
### follow INSTALL.md Path C.
###
### Partitioning is INTENTIONALLY INTERACTIVE — auto-picking the install
### disk on a multi-bay refurb rig would risk overwriting a drive-under-test
### target. The operator picks the OS disk from the menu; everything else
### is automated.

### Top-of-file controls — make absolutely sure we run unattended
d-i auto-install/enable boolean true
d-i debconf/priority select critical

### Locale + keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network — DHCP. Static IP can be set later via netplan if needed.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string driveforge
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string
# In QEMU/test mode there's no real network configuration to do; skip the
# question if the auto-detect can't reach a DHCP server.
d-i netcfg/dhcp_timeout string 30

### Mirror — the installer downloads the base system + any pkgsel/include
### packages from here. DriveForge's install.sh also runs apt-get update
### against this mirror during late_command to pull runtime deps
### (smartmontools, hdparm, sg3-utils, etc.) and pip-installs DriveForge
### directly from GitHub. The target requires internet during install;
### air-gapped users should follow the alternate path in INSTALL.md.
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Clock + timezone
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Accounts
###
### Root login DISABLED. The first user becomes the admin and is added to
### the `sudo` group so they can re-run install.sh / debug.
###
### IMPORTANT: do NOT name the admin user "driveforge" — that name is
### reserved for the system account install.sh creates for the daemon.
### Also avoid "admin" — Debian rejects it as a reserved system username
### (confirmed in a QEMU test on 2026-04-20: the installer paused with
### "The username you entered (admin) is reserved for use by the system").
### "forge" is short, clearly DriveForge-related, and isn't reserved.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string DriveForge Admin
d-i passwd/username string forge
# Setup-only password — operator MUST change immediately after first login.
d-i passwd/user-password password driveforge
d-i passwd/user-password-again password driveforge
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false
# Default groups Debian gives the first user OMIT `sudo`. Override so the
# admin user can sudo from the start — without this, post-install access
# requires editing /etc/sudoers via single-user mode.
d-i passwd/user-default-groups string adm cdrom dialout floppy audio dip video plugdev users netdev sudo

### Partitioning — INTERACTIVE (user picks disk).
###
### The installer pauses at "Select disk" — that's by design. Auto-picking
### would risk overwriting a drive-under-test target on a multi-bay rig.
### Once the operator confirms the disk, everything else is automated.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system
d-i base-installer/install-recommends boolean false

### apt setup — use the online Debian mirror (the mirror/ section above
### configured it). Security updates come from security.debian.org by
### default. Skip the "scan another CD?" prompt — there's no second CD.
###
### CRITICAL: `apt-setup/disable-cdrom-entries` scrubs the `cdrom:` entry
### from the INSTALLED system's /etc/apt/sources.list. Without it, the
### first `apt-get update` after boot errors with "The repository
### 'cdrom://...' does not have a Release file" because the netinst
### disc is gone — which kills install.sh's apt-get update under
### `set -euo pipefail` and leaves us with a half-installed system and
### a /var/log/driveforge-install-FAILED marker. `no-update` below only
### affects behavior DURING install; this line affects post-install.
d-i apt-setup/use_mirror boolean true
d-i apt-setup/services-select multiselect
d-i apt-cdrom-setup/no-update boolean true
d-i apt-setup/disable-cdrom-entries boolean true

### Software selection — skip tasksel's default groupings (which include
### "Debian desktop environment" — a ~700 MB GNOME install we don't
### want on an appliance). Instead explicitly list the minimal set we
### need before install.sh takes over.
###
### `git` + `ca-certificates` so late_command can git-clone the repo,
### `openssh-server` for remote admin, `sudo` so the admin user can elevate.
### DriveForge's install.sh pulls everything else (smartmontools, hdparm,
### sg3-utils, nvme-cli, Python deps, etc.) from the mirror on first boot.
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string openssh-server sudo git ca-certificates
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### Late command — runs after Debian base install + pkgsel completes,
### before reboot. Bootstraps DriveForge by git-cloning the public repo
### and running install.sh. The target has internet at this point
### (Debian's installer configured it during the netcfg stage), so apt
### and pip can reach their respective mirrors directly.
###
### `&&` chains commands so a failure at any step writes the marker
### file `/target/var/log/driveforge-install-FAILED` for post-reboot
### diagnosis. The install log is at `/var/log/driveforge-install.log`
### on the installed system.
###
### TEMPORARY during iso-installer iteration: `--branch feature/iso-installer`
### points the clone at the branch being tested instead of main. REMOVE
### this flag as part of the feature → main merge + v0.0.2 tag. Leaving
### it in post-merge would pin the installer to a branch that will
### eventually disappear. Tracked in backlog.
d-i preseed/late_command string \
  in-target /bin/bash -c 'git clone --branch feature/iso-installer https://github.com/JT4862/driveforge.git /opt/driveforge-src && cd /opt/driveforge-src && ./scripts/install.sh > /var/log/driveforge-install.log 2>&1' || \
  echo "DriveForge install FAILED — see /var/log/driveforge-install.log" > /target/var/log/driveforge-install-FAILED
