name: Real-hardware integration tests

# Runs on every PR to main. Executes against a self-hosted runner
# with a designated "test drive" connected via SATA or SAS. The
# test suite wipes that drive as part of exercising the real
# secure_erase code path.
#
# The runner must have:
#   - `DRIVEFORGE_INTEGRATION_DEVICE` env var set (to e.g.
#     /dev/sdh) — the test target drive
#   - `DRIVEFORGE_INTEGRATION_ALLOWED_SERIALS` env var set (to the
#     comma-separated serial(s) of drive(s) pre-approved for use
#     as test targets)
#   - The `driveforge-integration` runner label registered
#   - sudo NOPASSWD for the runner user to call sg_raw and hdparm
#     against the designated device
#
# If the runner isn't available or the env vars aren't set, the
# integration tests skip cleanly — they don't fail the PR. CI
# without an integration runner still runs the unit test suite in
# a normal GitHub-hosted runner (see ci.yml or similar if/when we
# add one).
#
# Operator setup docs: see docs/reference/integration-test-runner.md

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  integration:
    # The `[self-hosted, linux, driveforge-integration]` label triple
    # ensures we only run on an operator-configured runner, never on
    # GitHub's default runners (which wouldn't have the hardware
    # anyway, but we don't want the job to sit queueing forever if
    # labels are wrong).
    runs-on: [self-hosted, linux, driveforge-integration]
    # No timeout-minutes — individual test steps have their own caps
    # (30 min for erase); a runaway suite is self-limited.

    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show environment
        run: |
          echo "Runner hostname: $(hostname)"
          echo "Test device (from env): ${DRIVEFORGE_INTEGRATION_DEVICE:-NOT SET}"
          echo "Allowed serials: ${DRIVEFORGE_INTEGRATION_ALLOWED_SERIALS:-NOT SET}"
          lsblk

      - name: Set up Python venv
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/pip install --upgrade pip
          .venv-ci/bin/pip install -e ".[dev]"

      - name: Run unit tests
        run: .venv-ci/bin/pytest tests/unit/ -v

      - name: Run integration tests (gated by env var)
        # sudo -E preserves the DRIVEFORGE_INTEGRATION_* env vars
        # into the privileged shell; the integration tests themselves
        # do the safety-gate checks on the env vars before touching
        # any device. Runner's sudoers should have NOPASSWD for this
        # specific python venv binary against the designated device.
        run: |
          sudo -E .venv-ci/bin/pytest tests/integration/ -v -s
